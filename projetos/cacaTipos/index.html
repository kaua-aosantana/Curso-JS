<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo.css">
    <title>Caça Palavras de Tipos</title>
</head>
<body>
    <main>
        <section id="topo">
            <h1>Caça Tipos de Dados</h1>
            <input type="text" name="texto" id="itexto">
            <input type="button" value="Adicionar" id="botao">
        </section>
        <section id="corpo">
            <div>
                <h2>Strings</h2>
                <ul id="textos"></ul>
            </div>
            <div>
                <h2>Numeros</h2>
                <ul id="numeros"></ul>
            </div>
            <div>
                <h2>Booleanos</h2>
                <ul id="booleanos"></ul>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
